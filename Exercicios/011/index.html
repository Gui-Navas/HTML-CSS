<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias em HTML</title>
</head>
<body>
    <h1>Imagens dinamicas</h1>
    <p>Tente abrir esse site em vários dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador.</p>

    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="Imagens/Foto-g.png" alt="Imagem flexivel">
    </picture>
    <h1>Reproduzindo Áudios</h1>
    <p>Vamos aprender a reproduzir áudios em HTML.</p>
    <audio src="Midia/MC Meno K - Trava Chip (DJ Yuri Pedrada) Video clipe Oficial - MC MENO K (youtube).mp3" controls autoplay loop></audio> <!--MP3, WAV, OGG-->

    <audio preload="metadata" autoplay controls loop>
        <source src="Midia/MC Meno K - Trava Chip (DJ Yuri Pedrada) Video clipe Oficial - MC MENO K (youtube).mp3" type="audio/mpeg">
        <source src="Midia/MC Meno K - Trava Chip (DJ Yuri Pedrada) Video clipe Oficial - MC MENO K (youtube).ogg" type="audio/ogg">
        <source src="Midia/MC Meno K - Trava Chip (DJ Yuri Pedrada) Video clipe Oficial - MC MENO K (youtube).wav" type="audio/wav">
    </audio>
    <p>Infelizmente seu navegador não consegue reproduzir áudio. <a href="Midia/MC Meno K - Trava Chip (DJ Yuri Pedrada) Video clipe Oficial - MC MENO K (youtube).mp3">Baixar a música.</a></p>
</body>
</html>
