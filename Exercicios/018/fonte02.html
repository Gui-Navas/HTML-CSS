<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: 'Witch';
            src: url(fontes/Black\ Witcher.otf) format('opentype');
            font-weight: normal;
            font-style: normal;

            /*Tipos de Formatos
            
            - opentype (otf)
            - truetype (ttf)
            - embedded-opentype (Apple Advanced Typography)
            - svg
            */
        }
        body {
            font-family: 'Witch';
        }

        h1 {
            font-family: 'Witch';
            font-size: 3em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Olá Mundo!</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit Eius vel itaque ipsum doloremque inventore ea ratione harum voluptatum in consequatur facere impedit laboriosam expedita ex ipsa maxime Repellendus vitae vero!</p>
</body>
</html>
