<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas Grandes</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            width: 500px;
            border-collapse: collapse;
        }

        td, th {
            border: 2px solid black;
            padding: 8px;
        }

        thead, tfoot {
            background-color: rgb(70, 70, 70);
            color: white;
        }

        caption {
            font-size: 1.5em;
            padding: 10px;
            background-color: lightgrey;
            font-weight: bold;
        }

        td.num {
            text-align: right;
        }

        tbody > tr:nth-child(odd) {     /*2n-1*/
            background-color: #ffffff;
            font-weight: bold;
        }

        tbody > tr:nth-child(even) { /* 2n */
            text-decoration: underline;
            background-color: #9e9e9e;
        }
    </style>
</head>
<body>
    <h1>Uso de tabelas grandes</h1>
    <!--
        ANATOMIA PARA TABELAS GRANDES
        TABLE
            CAPITION
            THEAD
                TR, TD, TH
            TBODY
                TR, TD, TH
            TFOOT
                TR, TD, TH
    -->
        <table>
                <caption>População das Unidades Federativas</caption>
            <thead>
                <tr>
                    <th scope="col">Estado</th>
                    <th scope="col" style="width: 200px;">População</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>São Paulo</th>
                    <td class="num">45 919 049</td>
                </tr>
                <tr>
                    <td>Minas Gerais</td>
                    <td class="num">21 168 791</td>
                </tr>
                <tr>
                    <Td>Rio de Janeiro</Td>
                    <td class="num">17 264 943</td>
                </tr>
                <tr>
                    <td>Bahia</td>
                    <td class="num">9 290 392</td>
                </tr>
            </tbody>
            <tfoot>
                <tr>
                    <th scope="row">Total de Habitantes</th>
                    <td class="num"><strong>0000</strong></td>
                </tr>
            </tfoot>
        </table>
</body>
</html>
