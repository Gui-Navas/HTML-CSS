<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe</title>
    <style>

        iframe {
            width: 500px;
            height: 500px;
            border: 2px dashed black;
        }


    </style>
</head>
<body>
    <h1>Testa o uso de iframe</h1>
    <p>Acessando o site do 
        <!--Tamanho padrão 300x150-->
        <iframe src="https://www.cursoemvideo.com" frameborder="0" height="500">
            <a href="https://www.cursoemvideo.com" target="_blank">Curso em video</a>
        </iframe>

        para aprender a programar.
        </p>
        <p>
            O site do 

            <iframe src="https://www.google.com.br" frameborder="0" width="500"> [Seu navegador não é compativel com isso ]</iframe>

            Tambem é muito legal, pena que não funciona dentro do iframe!
        </p>

        <p>
            O repositório do guanabara 

            <iframe src="https://gustavoguanabara.github.io" frameborder="0" width="500" height="500">
                <a href="https://gustavoguanabara.github.io" target="_blank">Repositorio Guanabara</a>
            </iframe>

            tambrm é bem legal!
        </p>
</body>
</html>
